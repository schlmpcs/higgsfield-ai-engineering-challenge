services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://memory:memory@db:5432/memory
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-claude-sonnet-4-20250514}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  memory_pgdata:
    name: memory_pgdata
